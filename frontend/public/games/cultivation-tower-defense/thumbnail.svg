<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="12"/>
  <!-- Winding path -->
  <path d="M 20,40 Q 60,40 80,60 Q 100,80 140,70 Q 180,60 200,90 Q 220,120 260,110 Q 290,105 310,120" fill="none" stroke="#3a2a1a" stroke-width="20" stroke-linecap="round"/>
  <path d="M 20,40 Q 60,40 80,60 Q 100,80 140,70 Q 180,60 200,90 Q 220,120 260,110 Q 290,105 310,120" fill="none" stroke="#4a3a2a" stroke-width="16" stroke-linecap="round"/>
  <!-- Towers along the path -->
  <rect x="65" y="20" width="20" height="20" fill="#5a4a3a" rx="3"/>
  <text x="75" y="35" text-anchor="middle" font-size="10" fill="#4ade80">🗼</text>
  <rect x="115" y="40" width="20" height="20" fill="#5a4a3a" rx="3"/>
  <text x="125" y="55" text-anchor="middle" font-size="10" fill="#ffd700">🏯</text>
  <rect x="170" y="35" width="20" height="20" fill="#5a4a3a" rx="3"/>
  <text x="180" y="50" text-anchor="middle" font-size="10" fill="#4a9eff">⚡</text>
  <rect x="230" y="80" width="20" height="20" fill="#5a4a3a" rx="3"/>
  <text x="240" y="95" text-anchor="middle" font-size="10" fill="#ef4444">🔥</text>
  <rect x="275" y="85" width="20" height="20" fill="#5a4a3a" rx="3"/>
  <text x="285" y="100" text-anchor="middle" font-size="10" fill="#a855f7">❄️</text>
  <!-- Enemies on path -->
  <circle cx="100" cy="65" r="8" fill="#ef4444"/><text x="100" y="69" text-anchor="middle" font-size="9">👺</text>
  <circle cx="160" cy="68" r="8" fill="#ef4444"/><text x="160" y="72" text-anchor="middle" font-size="9">👺</text>
  <circle cx="215" cy="95" r="8" fill="#f97316"/><text x="215" y="99" text-anchor="middle" font-size="9">👹</text>
  <circle cx="280" cy="112" r="8" fill="#ef4444"/><text x="280" y="116" text-anchor="middle" font-size="9">👺</text>
  <!-- Projectiles from towers -->
  <line x1="85" y1="35" x2="100" y2="65" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="135" y1="50" x2="160" y2="68" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="190" y1="45" x2="160" y2="68" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="240" y1="80" x2="215" y2="95" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Base/endpoint -->
  <rect x="295" y="108" width="20" height="24" fill="#8b0000" rx="2"/>
  <text x="305" y="124" text-anchor="middle" font-size="10">🏰</text>
  <!-- HUD -->
  <text x="30" y="158" font-family="sans-serif" font-size="9" fill="#ffd700">💰 灵石: 350</text>
  <text x="160" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ef4444">Wave 5/10</text>
  <text x="290" y="158" text-anchor="end" font-family="sans-serif" font-size="9" fill="#4ade80">❤️ 18/20</text>
  <!-- Title -->
  <text x="160" y="178" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffd700">🏯 修仙塔防</text>
</svg>
