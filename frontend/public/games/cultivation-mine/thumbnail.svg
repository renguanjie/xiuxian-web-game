<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a28"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="12"/>
  <!-- Grid background -->
  <rect x="30" y="10" width="260" height="135" fill="#12121e" rx="4"/>
  <!-- Unrevealed tiles (top rows) -->
  <g>
    <rect x="30" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/><rect x="56" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/>
    <rect x="82" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/><rect x="108" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/>
    <rect x="134" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/><rect x="160" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/>
    <rect x="186" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/><rect x="212" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/>
    <rect x="238" y="10" width="26" height="27" fill="#3a3a4a" rx="2"/>
    <rect x="30" y="37" width="26" height="27" fill="#3a3a4a" rx="2"/><rect x="56" y="37" width="26" height="27" fill="#3a3a4a" rx="2"/>
    <rect x="82" y="37" width="26" height="27" fill="#3a3a4a" rx="2"/><rect x="108" y="37" width="26" height="27" fill="#3a3a4a" rx="2"/>
    <rect x="134" y="37" width="26" height="27" fill="#3a3a4a" rx="2"/>
  </g>
  <!-- Revealed area (bottom rows) -->
  <rect x="30" y="64" width="260" height="81" fill="#1a1a28" rx="2"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5">
    <line x1="56" y1="10" x2="56" y2="145"/><line x1="82" y1="10" x2="82" y2="145"/>
    <line x1="108" y1="10" x2="108" y2="145"/><line x1="134" y1="10" x2="134" y2="145"/>
    <line x1="160" y1="10" x2="160" y2="145"/><line x1="186" y1="10" x2="186" y2="145"/>
    <line x1="212" y1="10" x2="212" y2="145"/><line x1="238" y1="10" x2="238" y2="145"/>
    <line x1="30" y1="37" x2="290" y2="37"/><line x1="30" y1="64" x2="290" y2="64"/>
    <line x1="30" y1="91" x2="290" y2="91"/><line x1="30" y1="118" x2="290" y2="118"/>
  </g>
  <!-- Gems in revealed area -->
  <text x="43" y="81" text-anchor="middle" font-size="16" filter="url(#glow)">💎</text>
  <text x="95" y="108" text-anchor="middle" font-size="16" filter="url(#glow)">🪨</text>
  <text x="173" y="135" text-anchor="middle" font-size="16" filter="url(#glow)">⛏️</text>
  <text x="225" y="81" text-anchor="middle" font-size="16" filter="url(#glow)">💎</text>
  <text x="265" y="108" text-anchor="middle" font-size="16" filter="url(#glow)">🔮</text>
  <!-- Mine revealed -->
  <circle cx="147" cy="91" r="13" fill="rgba(255,68,0,0.3)"/>
  <text x="147" y="96" text-anchor="middle" font-size="14">💥</text>
  <!-- Flag on unrevealed -->
  <text x="173" y="30" text-anchor="middle" font-size="14">🚩</text>
  <text x="225" y="30" text-anchor="middle" font-size="14">🚩</text>
  <!-- Pickaxe cursor -->
  <text x="69" y="120" font-size="20">⛏️</text>
  <!-- HUD -->
  <rect x="30" y="150" width="260" height="18" fill="rgba(0,0,0,0.5)" rx="4"/>
  <text x="42" y="163" font-family="sans-serif" font-size="9" fill="#888">💥 0/3</text>
  <text x="160" y="163" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffd700">炼气期 | 150/100</text>
  <text x="278" y="163" text-anchor="end" font-family="sans-serif" font-size="9" fill="#4ade80">深度: 1</text>
  <!-- Title -->
  <text x="160" y="178" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffd700">⛏️ 挖矿仙人</text>
</svg>
