<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="12"/>
  <!-- Player in center -->
  <circle cx="160" cy="100" r="14" fill="#4ade80" filter="url(#glow)"/>
  <text x="160" y="105" text-anchor="middle" font-size="16">🧙</text>
  <!-- Player attack range circle -->
  <circle cx="160" cy="100" r="45" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Projectiles flying out -->
  <circle cx="130" cy="70" r="4" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="200" cy="80" r="4" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="140" cy="130" r="4" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="190" cy="130" r="4" fill="#ffd700" filter="url(#glow)"/>
  <!-- Enemies swarming in -->
  <circle cx="50" cy="50" r="10" fill="#ef4444"/><text x="50" y="54" text-anchor="middle" font-size="11">👺</text>
  <circle cx="80" cy="140" r="10" fill="#ef4444"/><text x="80" y="144" text-anchor="middle" font-size="11">👺</text>
  <circle cx="270" cy="60" r="10" fill="#ef4444"/><text x="270" y="64" text-anchor="middle" font-size="11">👺</text>
  <circle cx="280" cy="120" r="10" fill="#f97316"/><text x="280" y="124" text-anchor="middle" font-size="11">👹</text>
  <circle cx="40" cy="90" r="10" fill="#ef4444"/><text x="40" y="94" text-anchor="middle" font-size="11">👺</text>
  <circle cx="230" cy="40" r="10" fill="#a855f7"/><text x="230" y="44" text-anchor="middle" font-size="10">👹</text>
  <!-- Boss -->
  <circle cx="160" cy="30" r="16" fill="#a855f7" filter="url(#glow)"/>
  <text x="160" y="35" text-anchor="middle" font-size="14">💀</text>
  <!-- XP gems on ground -->
  <text x="120" y="90" font-size="8">💎</text>
  <text x="170" y="110" font-size="8">✨</text>
  <text x="145" y="120" font-size="8">💎</text>
  <!-- HUD bar -->
  <rect x="20" y="150" width="280" height="18" fill="rgba(0,0,0,0.5)" rx="4"/>
  <rect x="24" y="153" width="120" height="12" fill="#1a1a2e" rx="3"/>
  <rect x="24" y="153" width="80" height="12" fill="#4ade80" rx="3"/>
  <text x="84" y="163" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">HP</text>
  <text x="160" y="163" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffd700">BOSS 倒计时 45s</text>
  <text x="290" y="163" text-anchor="end" font-family="sans-serif" font-size="9" fill="#ef4444">Lv.8</text>
  <!-- Title -->
  <text x="160" y="178" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ef4444">⚔️ 修仙幸存者</text>
</svg>
