<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>修仙幸存者</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
  }
  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: none;
    image-rendering: pixelated;
  }
  /* Skill Selection Overlay */
  #skillOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #skillOverlay.active { display: flex; }
  #skillOverlay h2 {
    color: #ffd700;
    font-size: 2em;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }
  #skillOverlay .realm-text {
    color: #aaa;
    font-size: 1em;
    margin-bottom: 20px;
  }
  #skillCards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .skill-card {
    width: 200px;
    padding: 20px;
    background: linear-gradient(135deg, rgba(30,30,50,0.9), rgba(20,20,40,0.95));
    border: 2px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .skill-card:hover {
    border-color: #ffd700;
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(255,215,0,0.2);
  }
  .skill-card .icon { font-size: 2.5em; margin-bottom: 10px; }
  .skill-card .name { color: #ffd700; font-size: 1.2em; margin-bottom: 8px; }
  .skill-card .desc { color: #ccc; font-size: 0.85em; line-height: 1.4; }
  .skill-card .level { color: #8f8; font-size: 0.8em; margin-top: 8px; }
  /* Game Over Overlay */
  #gameOverOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 200;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #gameOverOverlay.active { display: flex; }
  #gameOverOverlay h1 {
    color: #ff4444;
    font-size: 2.5em;
    margin-bottom: 20px;
    text-shadow: 0 0 30px rgba(255,68,68,0.5);
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 40px;
    margin-bottom: 25px;
  }
  .stats-grid .label { color: #aaa; text-align: right; }
  .stats-grid .value { color: #ffd700; text-align: left; font-weight: bold; }
  #restartBtn {
    padding: 12px 40px;
    font-size: 1.2em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
  }
  #restartBtn:hover { transform: scale(1.05); }
  /* Leaderboard */
  #leaderboard {
    margin-top: 20px;
    max-width: 500px;
    width: 90%;
  }
  #leaderboard h3 {
    color: #ffd700;
    text-align: center;
    margin-bottom: 10px;
  }
  #leaderboard table {
    width: 100%;
    border-collapse: collapse;
  }
  #leaderboard td {
    padding: 5px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #leaderboard tr:nth-child(odd) { background: rgba(255,255,255,0.03); }
  #leaderboard .rank { color: #ffd700; width: 30px; }
  #leaderboard .lb-score { color: #8f8; text-align: right; }
  /* Start Screen */
  #startOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, rgba(20,10,30,0.95), rgba(0,0,0,0.98));
    z-index: 300;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #startOverlay h1 {
    font-size: 3.5em;
    color: #ffd700;
    text-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.3);
    margin-bottom: 10px;
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 40px rgba(255,215,0,0.6); }
    to { text-shadow: 0 0 60px rgba(255,215,0,0.8), 0 0 100px rgba(255,100,0,0.4); }
  }
  #startOverlay .subtitle {
    color: #aaa;
    font-size: 1.1em;
    margin-bottom: 30px;
  }
  #startOverlay .controls {
    color: #888;
    font-size: 0.9em;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.8;
  }
  #startBtn {
    padding: 15px 60px;
    font-size: 1.5em;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #000;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  #startBtn:hover { animation: none; transform: scale(1.1); }
  #mobile-controls {
    position: absolute;
    bottom: 15px; left: 15px; right: 15px;
    z-index: 15;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: none;
  }
  .joystick-area {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    position: relative;
    pointer-events: auto;
    touch-action: none;
  }
  .joystick-knob {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: rgba(74,222,128,0.4);
    border: 2px solid #4ade80;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .fire-btn-mobile {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(255,107,0,0.5);
    background: rgba(255,107,0,0.3);
    color: #fff; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: none; cursor: pointer;
    pointer-events: auto;
  }
  .fire-btn-mobile:active { background: rgba(255,107,0,0.6); }
  @media (pointer: coarse) { #mobile-controls { display: flex; } }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- Start Screen -->
<div id="startOverlay">
  <h1>修仙幸存者</h1>
  <p class="subtitle">大道五十，天衍四九，人遁其一</p>
  <div class="controls">
    <b>WASD / 方向键</b> 移动<br>
    <b>飞剑自动攻击</b> 击杀敌人获得经验升级<br>
    <b>E 键 / 点击大招按钮</b> 释放天劫大招 (每 10 击杀充能)
  </div>
  <button id="startBtn">开始修仙</button>
</div>

<!-- Skill Selection -->
<div id="skillOverlay">
  <h2>✨ 突破境界</h2>
  <p class="realm-text" id="levelText"></p>
  <div id="skillCards"></div>
</div>

<!-- Game Over -->
<div id="gameOverOverlay">
  <h1>💀 道消身殒</h1>
  <div class="stats-grid" id="finalStats"></div>
  <button id="restartBtn">再次修仙</button>
  <div id="leaderboard"></div>
</div>

<div id="mobile-controls">
  <div class="joystick-area" id="joystick">
    <div class="joystick-knob" id="joystick-knob"></div>
  </div>
  <div class="fire-btn-mobile" id="btn-fire-mobile">⚔️</div>
</div>

<script src="game.js"></script>
</body>
</html>
