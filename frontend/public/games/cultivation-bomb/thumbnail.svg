<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="explosion" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffdd00" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ff6b00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bomb" cx="0.4" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="12"/>
  <!-- Grid floor -->
  <rect x="40" y="30" width="240" height="130" fill="#1a1a2e" rx="4"/>
  <!-- Walls (top row) -->
  <rect x="40" y="30" width="30" height="26" fill="#5c4033" rx="2"/>
  <rect x="100" y="30" width="30" height="26" fill="#5c4033" rx="2"/>
  <rect x="190" y="30" width="30" height="26" fill="#5c4033" rx="2"/>
  <rect x="250" y="30" width="30" height="26" fill="#5c4033" rx="2"/>
  <!-- Soft walls (scattered) -->
  <rect x="70" y="56" width="30" height="26" fill="#a0522d" rx="2"/>
  <rect x="130" y="56" width="30" height="26" fill="#a0522d" rx="2"/>
  <rect x="220" y="56" width="30" height="26" fill="#a0522d" rx="2"/>
  <rect x="70" y="82" width="30" height="26" fill="#a0522d" rx="2"/>
  <rect x="160" y="82" width="30" height="26" fill="#a0522d" rx="2"/>
  <rect x="220" y="108" width="30" height="26" fill="#a0522d" rx="2"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="0.5">
    <line x1="70" y1="30" x2="70" y2="160"/><line x1="100" y1="30" x2="100" y2="160"/>
    <line x1="130" y1="30" x2="130" y2="160"/><line x1="160" y1="30" x2="160" y2="160"/>
    <line x1="190" y1="30" x2="190" y2="160"/><line x1="220" y1="30" x2="220" y2="160"/>
    <line x1="250" y1="30" x2="250" y2="160"/>
    <line x1="40" y1="56" x2="280" y2="56"/><line x1="40" y1="82" x2="280" y2="82"/>
    <line x1="40" y1="108" x2="280" y2="108"/><line x1="40" y1="134" x2="280" y2="134"/>
  </g>
  <!-- Player -->
  <circle cx="55" cy="121" r="11" fill="#4ade80"/>
  <text x="55" y="125" text-anchor="middle" font-size="12">🧙</text>
  <!-- Bomb -->
  <circle cx="145" cy="95" r="10" fill="url(#bomb)"/>
  <circle cx="149" cy="88" r="3" fill="#ff6b00"/>
  <line x1="149" y1="88" x2="155" y2="82" stroke="#ff6b00" stroke-width="2"/>
  <!-- Explosion -->
  <circle cx="200" cy="108" r="28" fill="url(#explosion)"/>
  <!-- Enemies -->
  <circle cx="250" cy="82" r="10" fill="#ef4444"/>
  <text x="250" y="87" text-anchor="middle" font-size="12">👺</text>
  <circle cx="250" cy="134" r="10" fill="#a855f7"/>
  <text x="250" y="139" text-anchor="middle" font-size="11">👹</text>
  <!-- Pickup -->
  <circle cx="175" cy="134" r="7" fill="#4a9eff"/>
  <text x="175" y="138" text-anchor="middle" font-size="9">💣</text>
  <!-- Title -->
  <text x="160" y="178" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ff6b00">💣 炸弹仙人</text>
</svg>
