<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="12"/>
  <!-- Stars -->
  <circle cx="30" cy="20" r="1" fill="#fff" opacity="0.5"/><circle cx="280" cy="15" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="10" r="1.5" fill="#fff" opacity="0.7"/><circle cx="60" cy="170" r="1" fill="#fff" opacity="0.4"/>
  <!-- Player (flying sword) -->
  <g transform="translate(80, 90) rotate(-15)">
    <polygon points="0,-20 5,5 0,0 -5,5" fill="#4a9eff" filter="url(#glow)"/>
    <polygon points="0,-15 3,2 0,0 -3,2" fill="#6bc5ff"/>
  </g>
  <!-- Player sword trail -->
  <path d="M 70,110 Q 80,95 85,80" fill="none" stroke="rgba(74,158,255,0.3)" stroke-width="2"/>
  <!-- Player sword bullets -->
  <line x1="95" y1="80" x2="140" y2="55" stroke="#ffd700" stroke-width="2"/>
  <line x1="95" y1="80" x2="130" y2="75" stroke="#4ade80" stroke-width="2"/>
  <!-- Enemies -->
  <circle cx="200" cy="50" r="12" fill="#ef4444"/><text x="200" y="54" text-anchor="middle" font-size="13">👹</text>
  <circle cx="260" cy="70" r="12" fill="#ef4444"/><text x="260" y="74" text-anchor="middle" font-size="13">👺</text>
  <circle cx="240" cy="110" r="12" fill="#f97316"/><text x="240" y="114" text-anchor="middle" font-size="13">👺</text>
  <circle cx="180" cy="130" r="12" fill="#a855f7"/><text x="180" y="134" text-anchor="middle" font-size="12">👹</text>
  <!-- Enemy projectiles -->
  <circle cx="170" cy="65" r="4" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="220" cy="100" r="4" fill="#f97316" filter="url(#glow)"/>
  <!-- Explosion from hit enemy -->
  <circle cx="200" cy="50" r="18" fill="rgba(255,68,0,0.2)"/>
  <!-- Power-up -->
  <text x="150" y="140" font-size="12" filter="url(#glow)">💎</text>
  <!-- HUD -->
  <text x="30" y="158" font-family="sans-serif" font-size="9" fill="#4ade80">❤️ 5</text>
  <text x="160" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffd700">得分: 3200</text>
  <text x="290" y="158" text-anchor="end" font-family="sans-serif" font-size="9" fill="#a855f7">飞剑 x3</text>
  <!-- Title -->
  <text x="160" y="178" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#4a9eff">🗡️ 仙剑射击</text>
</svg>
