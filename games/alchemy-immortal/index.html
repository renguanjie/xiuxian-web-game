<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>炼丹仙人</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    font-family: 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #e0d5c0;
    overflow: hidden;
  }
  .game-container {
    position: relative;
    width: 480px;
    max-width: 100vw;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: linear-gradient(135deg, #1a1a3a, #2a1a2a);
    border-radius: 12px 12px 0 0;
    border: 1px solid #3a2a5a;
    border-bottom: none;
  }
  .header h1 {
    font-size: 20px;
    background: linear-gradient(135deg, #ff8c42, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stats {
    display: flex;
    gap: 16px;
    font-size: 14px;
  }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .timer-bar {
    width: 100%;
    height: 6px;
    background: #1a1a2a;
    border-radius: 3px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff4444, #ffaa00, #44ff44);
    border-radius: 3px;
    transition: width 0.1s linear;
  }
  .board {
    display: grid;
    gap: 3px;
    padding: 10px;
    background: linear-gradient(180deg, #1a1a3a, #0f0f2a);
    border-left: 1px solid #3a2a5a;
    border-right: 1px solid #3a2a5a;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }
  .cell:hover { transform: scale(1.05); }
  .cell.selected {
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(255, 200, 100, 0.8);
    z-index: 1;
  }
  .cell.hint {
    animation: hintPulse 1.5s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(100, 200, 255, 0.4); transform: scale(1); }
    50% { box-shadow: 0 0 20px rgba(100, 200, 255, 0.9); transform: scale(1.08); }
  }
  .cell.matched {
    animation: explode 0.4s ease-out;
  }
  .cell.falling {
    animation: fall 0.3s ease-in;
  }
  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.5; }
    100% { transform: scale(0); opacity: 0; }
  }
  @keyframes fall {
    from { transform: translateY(-40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .combo-popup {
    position: absolute;
    font-size: 24px;
    font-weight: bold;
    color: #ffcc00;
    text-shadow: 0 0 10px rgba(255, 200, 0, 0.8);
    pointer-events: none;
    animation: comboFloat 1s ease-out forwards;
    z-index: 10;
  }
  @keyframes comboFloat {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
  }
  .footer {
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(135deg, #1a1a3a, #2a1a2a);
    border-radius: 0 0 12px 12px;
    border: 1px solid #3a2a5a;
    border-top: none;
  }
  .level-badge {
    padding: 4px 12px;
    background: linear-gradient(135deg, #7c5cfc, #5c3cdc);
    border-radius: 12px;
    font-size: 12px;
  }
  .btn {
    padding: 6px 16px;
    background: linear-gradient(135deg, #ff8c42, #ff6b35);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn:hover { transform: scale(1.05); }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 26, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    border-radius: 12px;
  }
  .overlay h2 {
    font-size: 32px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #ff8c42, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .overlay p { font-size: 16px; margin: 8px 0; color: #a09580; }
  .overlay .final-score { font-size: 48px; color: #ffcc00; margin: 16px 0; }
  .instructions {
    max-width: 300px;
    text-align: center;
    line-height: 1.6;
    color: #8a7a6a;
  }
  /* 不同元素样式 */
  .cell[data-type="fire"] { background: linear-gradient(135deg, #ff4444, #cc2200); }
  .cell[data-type="water"] { background: linear-gradient(135deg, #4488ff, #2266cc); }
  .cell[data-type="wood"] { background: linear-gradient(135deg, #44cc44, #22aa22); }
  .cell[data-type="metal"] { background: linear-gradient(135deg, #cccccc, #999999); }
  .cell[data-type="earth"] { background: linear-gradient(135deg, #ccaa44, #aa8822); }
  .cell[data-type="thunder"] { background: linear-gradient(135deg, #aa44ff, #8822cc); }
  #pause-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,15,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 50; flex-direction: column;
  }
  #pause-overlay.show { display: flex; }
  #pause-overlay h2 { font-size: 48px; color: #fff; margin-bottom: 12px; }
  #pause-overlay p { font-size: 16px; color: #aaa; }
  @media (pointer: coarse) {
    .game-container { width: 100vw; max-width: 480px; }
    canvas { width: 100% !important; height: auto !important; }
    #board { width: 100% !important; height: auto !important; }
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="header">
    <h1>🔥 炼丹仙人</h1>
    <div class="stats">
      <span>🏆 <span id="score">0</span></span>
      <span>⏱ <span id="time">60</span>s</span>
      <span>🔥 <span id="combo">0</span>连</span>
    </div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  <div class="board" id="board"></div>
  <div class="footer">
    <div class="level-badge" id="levelBadge">炼气期</div>
    <button class="btn" id="restartBtn">重新开始</button>
  </div>

  <div class="overlay" id="startOverlay">
    <h2>🔥 炼丹仙人</h2>
    <div class="instructions">
      <p>交换相邻的灵材，将3个或更多相同灵材连成一线</p>
      <p>🔥🔥🔥 → 合成灵丹 → 获得修为</p>
      <p>连续消除可获得额外连击奖励！</p>
      <p style="margin-top:12px;">⏱ 限时60秒，尽可能获得更多修为</p>
    </div>
    <button class="btn" style="margin-top:20px;font-size:18px;padding:10px 32px;" onclick="startGame()">开始炼丹</button>
  </div>

  <div class="overlay" id="endOverlay" style="display:none;">
    <h2>炼丹完成！</h2>
    <p>本次获得修为</p>
    <div class="final-score" id="finalScore">0</div>
    <p id="finalLevel">境界：炼气期</p>
    <p id="maxCombo">最大连击：0</p>
    <button class="btn" style="margin-top:20px;font-size:18px;padding:10px 32px;" onclick="startGame()">再次炼丹</button>
  </div>
  <div id="pause-overlay">
    <h2>⏸️ 暂停</h2>
    <p>按 P 继续</p>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
