<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#1a0a1a"/>
    </linearGradient>
    <radialGradient id="fire" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)" rx="12"/>
  <!-- Base -->
  <rect x="130" y="145" width="60" height="20" rx="3" fill="#5a4a2a"/>
  <text x="160" y="160" text-anchor="middle" font-size="14">🏛️</text>
  <!-- Tank player -->
  <circle cx="160" cy="120" r="12" fill="#4ade80"/>
  <rect x="157" y="100" width="6" height="20" rx="2" fill="#22c55e"/>
  <text x="160" y="125" text-anchor="middle" font-size="12">🐉</text>
  <!-- Bullet -->
  <line x1="160" y1="100" x2="160" y2="60" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="160" cy="55" r="3" fill="#4ade80"/>
  <!-- Enemies -->
  <circle cx="100" cy="80" r="10" fill="#ef4444"/>
  <text x="100" y="85" text-anchor="middle" font-size="12">👺</text>
  <circle cx="220" cy="70" r="10" fill="#ef4444"/>
  <text x="220" y="75" text-anchor="middle" font-size="12">👺</text>
  <circle cx="200" cy="100" r="10" fill="#a855f7"/>
  <text x="200" y="105" text-anchor="middle" font-size="12">👹</text>
  <circle cx="120" cy="100" r="10" fill="#f97316"/>
  <text x="120" y="105" text-anchor="middle" font-size="12">👺</text>
  <!-- Bullet from enemy -->
  <line x1="220" y1="70" x2="180" y2="95" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,4"/>
  <!-- Walls -->
  <rect x="60" y="40" width="20" height="20" rx="1" fill="#4a4a5a"/>
  <rect x="90" y="40" width="20" height="20" rx="1" fill="#4a4a5a"/>
  <rect x="240" y="40" width="20" height="20" rx="1" fill="#4a4a5a"/>
  <rect x="180" y="40" width="20" height="20" rx="1" fill="#3a2a1a"/>
  <!-- Fire effect -->
  <circle cx="160" cy="140" r="40" fill="url(#fire)"/>
  <!-- Title -->
  <text x="160" y="178" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffd700">🐉 愤怒仙兽</text>
</svg>
