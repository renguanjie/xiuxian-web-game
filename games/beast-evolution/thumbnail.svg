<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2a2a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Evolution chain -->
  <text x="40" y="80" font-size="28">🐛</text>
  <text x="90" y="80" font-size="14" fill="#44ddcc">→</text>
  <text x="110" y="80" font-size="28">🐍</text>
  <text x="160" y="80" font-size="14" fill="#44ddcc">→</text>
  <text x="180" y="80" font-size="28">🦊</text>
  <text x="230" y="80" font-size="14" fill="#44ddcc">→</text>
  <text x="255" y="80" font-size="28">🐉</text>
  <text x="160" y="120" text-anchor="middle" font-size="20" fill="#44ddcc" font-family="sans-serif" font-weight="bold">仙兽进化</text>
  <text x="160" y="145" text-anchor="middle" font-size="13" fill="#a09580" font-family="sans-serif">大鱼吃小鱼</text>
</svg>
